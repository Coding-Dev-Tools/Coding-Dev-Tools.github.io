# Deploys the site by syncing main's content to the gh-pages branch.
#
# WHY: GitHub Pages for this repo uses legacy "deploy from branch" serving
# gh-pages (see gh-pages history: "use legacy Pages deployment instead"),
# while content updates land on main. Until now the two branches were kept
# in sync by hand, so a content push to main that nobody manually mirrored
# looked green yet never reached the live site. This workflow makes main
# the single source of truth: every content push to main lands on gh-pages
# as a normal (non-force) commit, and Pages rebuilds from there.
#
# Loud by design: no step swallows errors; the sync step prints either the
# deployed commit or an explicit "already in sync" skip.
name: deploy-pages
on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  sync-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main (full history incl. gh-pages)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync site content to gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add ../ghp origin/gh-pages
          # gh-pages is a deployment artifact of main: mirror content exactly
          # (removals included; prior states stay recoverable in gh-pages
          # history because commits are never force-pushed).
          # .git is the worktree pointer; .github is source, not site content.
          rsync -a --delete --exclude='.git' --exclude='.github' ./ ../ghp/
          cd ../ghp
          git add -A
          if git diff --cached --quiet; then
            echo "gh-pages already in sync with main@${GITHUB_SHA} - nothing to deploy."
            exit 0
          fi
          git commit -m "deploy: sync site from main@${GITHUB_SHA}"
          git push origin HEAD:gh-pages
          echo "Deployed main@${GITHUB_SHA} to gh-pages - Pages will rebuild from the new tip."
